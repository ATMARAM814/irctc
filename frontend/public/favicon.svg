<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#0B1F3A" />
    </linearGradient>
    <!-- Gold Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <!-- Outer Rounded Circular Badge -->
  <circle cx="16" cy="16" r="15" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="1.5" />

  <!-- High-Speed Rail Curve -->
  <path d="M 5 22 C 10 26, 22 26, 27 22" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />

  <!-- Bold Clean "IR" Emblem -->
  <text x="16" y="18.5" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="900" 
        font-size="11px" 
        fill="url(#gold-grad)" 
        text-anchor="middle" 
        letter-spacing="-0.02em">IR</text>
</svg>
